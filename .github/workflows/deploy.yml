# Deploys the built site to Dreamhost over rsync/SSH.
#
# Manual-trigger only until Chris confirms the first deploy looks right
# (CLAUDE.md: "Chris decides at first deploy"). To make it automatic
# afterward, uncomment the push trigger below.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   DEPLOY_SSH_KEY  private half of the dedicated deploy keypair (set via gh)
#   DEPLOY_HOST     Dreamhost SSH server, e.g. example.dreamhost.com
#   DEPLOY_USER     the shell user on that server
#   DEPLOY_PATH     directory the site serves from, with trailing slash,
#                   e.g. ~/namemasker.com/
# The matching public key must be in the shell user's ~/.ssh/authorized_keys.
name: deploy

on:
  workflow_dispatch:
  # push:
  #   branches: [main]
  #   paths: ['apps/site/**', 'packages/core/**']

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 26
          cache: npm

      - name: Install (exact lockfile)
        run: npm ci

      - name: Test core
        run: npm test

      - name: Build site
        run: npm -w @namemasker/site run build

      - name: Deploy over rsync/SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new" \
            apps/site/dist/ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH"
